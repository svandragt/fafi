version: "2"
run:
  go: "1.24"
  build-tags:
    - fts5
linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
linters-settings:
  staticcheck:
    checks:
      - "SA*"  # safety-critical: bugs, correctness
      - "S1*"  # simplifications
issues:
  exclude-dirs-use-default: true  # skip vendor/, testdata/, generated code
